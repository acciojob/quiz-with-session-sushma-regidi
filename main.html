<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quiz with Session & Local Storage</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    h2 { margin-bottom: 10px; }
    .question { margin-bottom: 15px; }
    .options label { display: block; margin: 4px 0; cursor: pointer; }
    #submit { margin-top: 20px; padding: 8px 16px; }
    #score { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Simple Quiz</h2>

  <div id="questions"></div>

<button id="submit">Submit</button>

  <div id="score"></div>

  <script>
    const questionsData = [
      {
        question: "What is the capital of France?",
        options: ["Berlin", "Madrid", "Paris", "Rome"],
        answer: 2
      },
      {
        question: "Which language runs in a web browser?",
        options: ["Java", "C", "Python", "JavaScript"],
        answer: 3
      },
      {
        question: "What does CSS stand for?",
        options: ["Colorful Style Sheets", "Cascading Style Sheets", "Creative Style Sheets", "Computer Style Sheets"],
        answer: 1
      },
      {
        question: "Which HTML tag is used for JavaScript?",
        options: ["<js>", "<javascript>", "<script>", "<code>"],
        answer: 2
      },
      {
        question: "Which company developed JavaScript?",
        options: ["Microsoft", "Apple", "Netscape", "Google"],
        answer: 2
      }
    ];

    const questionsContainer = document.getElementById("questions");
    const submitBtn = document.getElementById("submit");
    const scoreDiv = document.getElementById("score");

    // Load progress from sessionStorage
    let progress = JSON.parse(sessionStorage.getItem("progress")) || {};

    // Render questions
    function renderQuestions() {
      questionsContainer.innerHTML = "";

      questionsData.forEach((q, qIndex) => {
        const qDiv = document.createElement("div");
        qDiv.className = "question";

        const qTitle = document.createElement("p");
        qTitle.textContent = `${qIndex + 1}. ${q.question}`;
        qDiv.appendChild(qTitle);

        const optionsDiv = document.createElement("div");
        optionsDiv.className = "options";

        q.options.forEach((opt, optIndex) => {
          const label = document.createElement("label");
          const input = document.createElement("input");
          input.type = "radio";
          input.name = `question-${qIndex}`;
          input.value = optIndex;

          // Restore checked state
          if (progress[qIndex] == optIndex) {
            input.checked = true;
          }

          input.addEventListener("change", () => {
            progress[qIndex] = optIndex;
            sessionStorage.setItem("progress", JSON.stringify(progress));
          });

          label.appendChild(input);
          label.appendChild(document.createTextNode(" " + opt));
          optionsDiv.appendChild(label);
        });

        qDiv.appendChild(optionsDiv);
        questionsContainer.appendChild(qDiv);
      });
    }

    // Calculate score
    function calculateScore() {
      let score = 0;
      questionsData.forEach((q, index) => {
        if (progress[index] == q.answer) {
          score++;
        }
      });
      return score;
    }

    // Submit handler
    submitBtn.addEventListener("click", () => {
      const finalScore = calculateScore();
      const scoreText = `Your score is ${finalScore} out of 5.`;
      scoreDiv.textContent = scoreText;
      localStorage.setItem("score", finalScore.toString());
    });

    // Restore score from localStorage if exists
    const savedScore = localStorage.getItem("score");
    if (savedScore !== null) {
      scoreDiv.textContent = `Your score is ${savedScore} out of 5.`;
    }

    // Initial render
    renderQuestions();
  </script>

</body>
</html>
