<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz with Session & Local Storage</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e11;
      --surface: #16161c;
      --border: #2a2a36;
      --accent: #c8f135;
      --accent2: #7c3aed;
      --text: #f0f0f5;
      --muted: #6b6b80;
      --correct: #22c55e;
      --wrong: #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px;
      background-image: radial-gradient(ellipse at 20% 10%, rgba(124,58,237,0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 90%, rgba(200,241,53,0.08) 0%, transparent 50%);
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header .label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, #f0f0f5 40%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .quiz-wrapper {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Each question card */
    #questions > div {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 32px;
      position: relative;
      transition: border-color 0.2s;
    }

    #questions > div:hover {
      border-color: var(--accent2);
    }

    .q-number {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .q-text {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 20px;
      color: var(--text);
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .choice-label {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-size: 0.95rem;
      user-select: none;
    }

    .choice-label:hover {
      background: rgba(200,241,53,0.07);
      border-color: var(--accent);
    }

    .choice-label input[type="radio"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--muted);
      flex-shrink: 0;
      position: relative;
      transition: border-color 0.15s;
      cursor: pointer;
    }

    .choice-label input[type="radio"]:checked {
      border-color: var(--accent);
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,241,53,0.2);
    }

    .choice-label input[type="radio"]:checked::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--bg);
    }

    .choice-label:has(input[type="radio"]:checked) {
      background: rgba(200,241,53,0.08);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Submit button */
    #submit {
      margin-top: 8px;
      width: 100%;
      padding: 18px 32px;
      background: var(--accent);
      color: #0e0e11;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 24px rgba(200,241,53,0.25);
    }

    #submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(200,241,53,0.4);
    }

    #submit:active {
      transform: translateY(0);
    }

    /* Score display */
    #score {
      margin-top: 4px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 700;
      min-height: 28px;
      transition: all 0.3s;
    }

    #score.show {
      padding: 22px 28px;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 14px;
      color: var(--accent);
      font-size: 1.3rem;
      box-shadow: 0 0 32px rgba(200,241,53,0.1);
      animation: pop 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes pop {
      from { transform: scale(0.9); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .score-sub {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <header>
    <p class="label">Knowledge Check</p>
    <h1>Quick Quiz</h1>
  </header>

  <div class="quiz-wrapper">
    <div id="questions"></div>
    <button id="submit">Submit Quiz</button>
    <div id="score"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
