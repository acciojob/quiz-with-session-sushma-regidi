<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }
 
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 36px;
      max-width: 680px;
      width: 100%;
    }
 
    h1 {
      text-align: center;
      color: #1a202c;
      margin-bottom: 28px;
      font-size: 1.8rem;
    }
 
    #questions > div {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 18px;
    }
 
    .question-text {
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 14px;
      font-size: 1rem;
    }
 
    .option-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 6px;
      cursor: pointer;
      color: #4a5568;
      transition: background 0.15s;
      margin-bottom: 6px;
    }
 
    .option-label:hover { background: #edf2f7; }
 
    .option-label input[type="radio"] {
      accent-color: #4f46e5;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
 
    button#submit {
      display: block;
      width: 100%;
      padding: 14px;
      margin-top: 24px;
      background: #4f46e5;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
 
    button#submit:hover { background: #4338ca; }
 
    div#score {
      margin-top: 22px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 700;
      color: #2d3748;
      min-height: 28px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Multiple Choice Quiz</h1>
    <div id="questions"></div>
    <button id="submit">Submit</button>
    <div id="score"></div>
  </div>
 
  <script src="script.js"></script>
</body>
</html>
